<!-- ============================================
     1. MOCK · APP (iPhone com app PWA)
     class="product-mock mock-app"
     ============================================ -->

<style data-mock="app">
  .mock-app{background:linear-gradient(135deg,var(--primary-deep),var(--primary));align-items:center}
  .mock-iphone{
    width:200px;aspect-ratio:9/19;background:#0a0606;border-radius:24px;padding:8px;
    position:relative;box-shadow:0 20px 50px rgba(0,0,0,.5);
  }
  .mock-iphone::before{
    content:"";position:absolute;top:14px;left:50%;transform:translateX(-50%);
    width:80px;height:18px;background:#000;border-radius:0 0 12px 12px;z-index:2;
  }
  .mock-iphone-screen{
    width:100%;height:100%;border-radius:18px;overflow:hidden;
    background:linear-gradient(180deg,#fff 0%,var(--neutral-warm) 100%);
    padding:32px 14px 14px;display:flex;flex-direction:column;align-items:center;text-align:center;
  }
  .mock-iphone-app{font-family:var(--serif);font-size:11px;color:var(--primary);margin-top:10px;margin-bottom:10px;font-weight:600}
  .mock-iphone-greet{font-size:9px;color:var(--text-mute);margin-bottom:14px;letter-spacing:.1em}
  .mock-iphone-card{
    width:100%;background:#fff;border:1px solid var(--border);border-radius:8px;padding:10px;margin-bottom:8px;text-align:left;
  }
  .mock-iphone-card-title{font-size:9px;color:var(--primary);font-weight:600;margin-bottom:4px}
  .mock-iphone-card-body{font-size:7px;color:var(--text-soft);line-height:1.3}
  .mock-iphone-progress{margin-top:auto;width:100%;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
  .mock-iphone-progress::before{content:"";display:block;width:65%;height:100%;background:var(--primary)}
  .mock-iphone-cta{margin-top:10px;background:var(--primary);color:#fff;padding:5px 14px;border-radius:99px;font-size:8px;font-weight:600;letter-spacing:.1em;text-transform:uppercase}
</style>

<template data-mock="app-html">
  <div class="product-mock mock-app">
    <div class="mock-iphone">
      <div class="mock-iphone-screen">
        <div class="mock-iphone-app">★ {{APP_BRAND}}</div>
        <div class="mock-iphone-greet">{{APP_GREETING}}</div>
        <div class="mock-iphone-card">
          <div class="mock-iphone-card-title">{{APP_CARD1_TITLE}}</div>
          <div class="mock-iphone-card-body">{{APP_CARD1_BODY}}</div>
        </div>
        <div class="mock-iphone-card">
          <div class="mock-iphone-card-title">{{APP_CARD2_TITLE}}</div>
          <div class="mock-iphone-card-body">{{APP_CARD2_BODY}}</div>
        </div>
        <div class="mock-iphone-progress"></div>
        <div class="mock-iphone-cta">{{APP_CTA}}</div>
      </div>
    </div>
  </div>
</template>


<!-- ============================================
     2. MOCK · EBOOK (capa de livro)
     class="product-mock mock-ebook"
     ============================================ -->

<style data-mock="ebook">
  .mock-ebook{background:linear-gradient(135deg,var(--neutral-warm),var(--neutral-light))}
  .mock-book{
    width:170px;aspect-ratio:2/3;background:#fff;
    border-radius:2px 6px 6px 2px;padding:24px 18px;display:flex;flex-direction:column;
    color:var(--text);position:relative;
    box-shadow:-8px 14px 30px rgba(0,0,0,.18),inset 4px 0 0 rgba(0,0,0,.05);
    border:1px solid var(--border);
  }
  .mock-book::before{content:"";position:absolute;left:6px;top:0;bottom:0;width:1px;background:var(--border)}
  .mock-book-eye{font-family:var(--mono);font-size:8px;letter-spacing:.3em;text-transform:uppercase;margin-bottom:14px;color:var(--accent-deep);font-weight:600}
  .mock-book-title{font-family:var(--serif);font-size:22px;line-height:1.05;color:var(--primary);margin-bottom:auto;font-weight:500;font-style:italic}
  .mock-book-author{font-family:var(--mono);font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--accent-deep);margin-top:14px}
  .mock-book-deco{position:absolute;bottom:24px;right:18px;font-family:var(--serif);font-size:30px;color:var(--accent);opacity:.6;font-style:italic}
</style>

<template data-mock="ebook-html">
  <div class="product-mock mock-ebook">
    <div class="mock-book">
      <div class="mock-book-eye">{{EBOOK_EYEBROW}}</div>
      <div class="mock-book-title">{{EBOOK_TITULO}}</div>
      <div class="mock-book-author">{{EBOOK_AUTHOR}}</div>
      <div class="mock-book-deco">{{EBOOK_DECO}}</div>
    </div>
  </div>
</template>


<!-- ============================================
     3. MOCK · MENTORIA (badge premium)
     class="product-mock mock-mentoria"
     ============================================ -->

<style data-mock="mentoria">
  .mock-mentoria{background:linear-gradient(135deg,var(--primary-deep),var(--primary));position:relative;overflow:hidden}
  .mock-mentoria::before{
    content:"";position:absolute;inset:0;
    background-image:linear-gradient(rgba(255,255,255,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.05) 1px,transparent 1px);
    background-size:30px 30px;
  }
  .mock-mentoria-badge{
    position:relative;z-index:1;background:#fff;color:var(--primary-deep);
    padding:18px 28px;border-radius:var(--radius);text-align:center;
    box-shadow:0 14px 40px rgba(0,0,0,.4);border:1px solid var(--accent);
  }
  .mock-mentoria-badge .l1{font-family:var(--mono);font-size:9px;letter-spacing:.3em;color:var(--accent-deep);font-weight:700;margin-bottom:6px}
  .mock-mentoria-badge .l2{font-family:var(--serif);font-style:italic;font-size:24px;line-height:1;margin-bottom:6px;color:var(--primary)}
  .mock-mentoria-badge .l3{font-family:var(--mono);font-size:10px;letter-spacing:.15em;color:var(--text-soft)}
</style>

<template data-mock="mentoria-html">
  <div class="product-mock mock-mentoria">
    <div class="mock-mentoria-badge">
      <div class="l1">{{MENT_TAGLINE}}</div>
      <div class="l2">{{MENT_NOME}}</div>
      <div class="l3">{{MENT_META}}</div>
    </div>
  </div>
</template>


<!-- ============================================
     4. MOCK · NEWSLETTER (carta editorial)
     class="product-mock mock-news"
     ============================================ -->

<style data-mock="news">
  .mock-news{background:var(--neutral-warm);border-bottom:1px solid var(--border)}
  .mock-letter{
    width:60%;aspect-ratio:3/4;background:#fff;
    padding:22px 20px;font-size:8px;line-height:1.4;color:var(--text-soft);
    box-shadow:0 14px 40px rgba(0,0,0,.18);
    border-left:3px solid var(--primary);position:relative;border-radius:2px;
  }
  .mock-letter::before{
    content:attr(data-brand);font-family:var(--mono);font-size:8px;
    letter-spacing:.2em;color:var(--primary);display:block;margin-bottom:10px;text-transform:uppercase;font-weight:600;
  }
  .mock-letter-h{font-family:var(--serif);font-size:14px;line-height:1.1;color:var(--text);margin-bottom:8px;font-style:italic}
  .mock-letter-p{margin-bottom:6px}
  .mock-letter-sig{font-family:var(--serif);font-style:italic;color:var(--primary);margin-top:10px;font-size:9px}
</style>

<template data-mock="news-html">
  <div class="product-mock mock-news">
    <div class="mock-letter" data-brand="{{NEWS_BRAND}}">
      <div class="mock-letter-h">{{NEWS_TITULO}}</div>
      <div class="mock-letter-p">{{NEWS_PARAGRAFO1}}</div>
      <div class="mock-letter-p">{{NEWS_PARAGRAFO2}}</div>
      <div class="mock-letter-sig">— {{NEWS_AUTHOR}}</div>
    </div>
  </div>
</template>


<!-- ============================================
     5. MOCK · TELECONSULTA (janela de vídeo)
     class="product-mock mock-tele"
     ============================================ -->

<style data-mock="tele">
  .mock-tele{background:linear-gradient(135deg,#fff,var(--neutral-warm));position:relative}
  .mock-tele-window{
    width:75%;aspect-ratio:16/10;background:#1a2233;border-radius:8px;
    box-shadow:0 14px 40px rgba(0,0,0,.4);overflow:hidden;
    display:grid;grid-template-rows:auto 1fr auto;
  }
  .mock-tele-bar{background:#0a1320;padding:6px 10px;display:flex;align-items:center;gap:6px}
  .mock-tele-bar-dot{width:6px;height:6px;border-radius:50%;background:#3a4d63}
  .mock-tele-bar-title{margin-left:auto;font-family:var(--mono);font-size:8px;color:rgba(255,255,255,.5)}
  .mock-tele-vid{display:grid;grid-template-columns:1fr 1fr;gap:4px;padding:6px;background:#1a2233}
  .mock-tele-vid-cell{background:linear-gradient(135deg,var(--primary),var(--primary-deep));border-radius:4px;display:flex;align-items:center;justify-content:center;color:#fff;font-family:var(--serif);font-size:18px;font-weight:600;font-style:italic}
  .mock-tele-vid-cell.b{background:linear-gradient(135deg,var(--text-soft),var(--text))}
  .mock-tele-foot{background:#0a1320;padding:8px;display:flex;justify-content:center;gap:6px}
  .mock-tele-btn{width:24px;height:24px;border-radius:50%;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px}
  .mock-tele-btn.end{background:#dc2626}
</style>

<template data-mock="tele-html">
  <div class="product-mock mock-tele">
    <div class="mock-tele-window">
      <div class="mock-tele-bar">
        <span class="mock-tele-bar-dot"></span>
        <span class="mock-tele-bar-dot"></span>
        <span class="mock-tele-bar-dot"></span>
        <span class="mock-tele-bar-title">{{TELE_TITLE}}</span>
      </div>
      <div class="mock-tele-vid">
        <div class="mock-tele-vid-cell">{{TELE_LETRA1}}</div>
        <div class="mock-tele-vid-cell b">{{TELE_LETRA2}}</div>
      </div>
      <div class="mock-tele-foot">
        <span class="mock-tele-btn">●</span>
        <span class="mock-tele-btn">▶</span>
        <span class="mock-tele-btn end">✕</span>
      </div>
    </div>
  </div>
</template>


<!-- ============================================
     6. MOCK · SAAS (dashboard)
     class="product-mock mock-saas"
     ============================================ -->

<style data-mock="saas">
  .mock-saas{background:linear-gradient(135deg,var(--neutral-warm),var(--neutral-light))}
  .mock-dashboard{
    width:75%;aspect-ratio:16/10;background:#fff;border-radius:8px;
    padding:14px;font-size:8px;
    box-shadow:0 14px 40px rgba(0,0,0,.18);
    display:grid;grid-template-columns:60px 1fr;gap:8px;border:1px solid var(--border);
  }
  .mock-dashboard-side{background:var(--primary-deep);border-radius:6px;padding:10px 6px;color:#fff}
  .mock-dashboard-side div{margin-bottom:8px;font-size:7px;letter-spacing:.06em}
  .mock-dashboard-main{display:grid;grid-template-rows:auto auto 1fr;gap:8px}
  .mock-dashboard-h{font-family:var(--serif);font-style:italic;font-size:14px;color:var(--primary)}
  .mock-dashboard-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
  .mock-dashboard-stat{background:var(--neutral-warm);border-radius:4px;padding:6px 8px;border:1px solid var(--border)}
  .mock-dashboard-stat strong{display:block;font-family:var(--serif);font-style:italic;font-size:14px;color:var(--primary);margin-bottom:2px}
  .mock-dashboard-chart{background:var(--neutral-warm);border-radius:4px;padding:8px;border:1px solid var(--border)}
  .mock-dashboard-bars{display:flex;align-items:flex-end;gap:3px;height:100%}
  .mock-dashboard-bar{flex:1;background:var(--primary);border-radius:1px}
</style>

<template data-mock="saas-html">
  <div class="product-mock mock-saas">
    <div class="mock-dashboard">
      <div class="mock-dashboard-side">
        <div>● {{SAAS_NAV1}}</div><div>● {{SAAS_NAV2}}</div><div>● {{SAAS_NAV3}}</div><div>● {{SAAS_NAV4}}</div><div>● {{SAAS_NAV5}}</div>
      </div>
      <div class="mock-dashboard-main">
        <div class="mock-dashboard-h">{{SAAS_TITULO}}</div>
        <div class="mock-dashboard-stats">
          <div class="mock-dashboard-stat"><strong>{{SAAS_STAT1_VAL}}</strong>{{SAAS_STAT1_LABEL}}</div>
          <div class="mock-dashboard-stat"><strong>{{SAAS_STAT2_VAL}}</strong>{{SAAS_STAT2_LABEL}}</div>
          <div class="mock-dashboard-stat"><strong>{{SAAS_STAT3_VAL}}</strong>{{SAAS_STAT3_LABEL}}</div>
        </div>
        <div class="mock-dashboard-chart">
          <div class="mock-dashboard-bars">
            <div class="mock-dashboard-bar" style="height:25%"></div>
            <div class="mock-dashboard-bar" style="height:38%"></div>
            <div class="mock-dashboard-bar" style="height:50%"></div>
            <div class="mock-dashboard-bar" style="height:62%"></div>
            <div class="mock-dashboard-bar" style="height:75%"></div>
            <div class="mock-dashboard-bar" style="height:85%"></div>
            <div class="mock-dashboard-bar" style="height:95%"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</template>


<!-- ============================================
     7. MOCK · YOUTUBE (player de vídeo)
     class="product-mock mock-youtube"
     ============================================ -->

<style data-mock="youtube">
  .mock-youtube{background:linear-gradient(135deg,#0F0F0F,#1F1F1F);align-items:center;padding:24px}
  .mock-yt-window{
    width:80%;background:#181818;border-radius:8px;overflow:hidden;
    box-shadow:0 14px 40px rgba(0,0,0,.4);
  }
  .mock-yt-thumb{
    aspect-ratio:16/9;background:linear-gradient(135deg,var(--primary-deep),var(--primary));
    position:relative;display:flex;align-items:center;justify-content:center;
  }
  .mock-yt-play{
    width:50px;height:50px;border-radius:50%;background:rgba(255,0,0,.9);
    color:#fff;display:flex;align-items:center;justify-content:center;font-size:18px;
    padding-left:4px;box-shadow:0 6px 20px rgba(255,0,0,.4);
  }
  .mock-yt-title{
    position:absolute;bottom:10px;left:10px;right:60px;
    font-family:var(--serif);font-style:italic;font-size:13px;
    color:#fff;line-height:1.2;text-shadow:0 2px 8px rgba(0,0,0,.6);
  }
  .mock-yt-time{
    position:absolute;bottom:10px;right:10px;
    background:rgba(0,0,0,.85);color:#fff;
    font-family:var(--mono);font-size:9px;padding:2px 5px;border-radius:2px;
  }
  .mock-yt-meta{padding:10px 12px;background:#181818}
  .mock-yt-channel{font-size:10px;color:#fff;font-weight:500;margin-bottom:3px}
  .mock-yt-stats{font-size:8px;color:#aaa}
</style>

<template data-mock="youtube-html">
  <div class="product-mock mock-youtube">
    <div class="mock-yt-window">
      <div class="mock-yt-thumb">
        <div class="mock-yt-play">▶</div>
        <div class="mock-yt-title">{{YT_TITULO}}</div>
        <div class="mock-yt-time">{{YT_DURACAO}}</div>
      </div>
      <div class="mock-yt-meta">
        <div class="mock-yt-channel">{{YT_CANAL}}</div>
        <div class="mock-yt-stats">{{YT_STATS}}</div>
      </div>
    </div>
  </div>
</template>


<!-- ============================================
     8. MOCK · FUNNEL (fluxo de aquisição)
     class="product-mock mock-funnel"
     ============================================ -->

<style data-mock="funnel">
  .mock-funnel{background:linear-gradient(135deg,var(--neutral-warm),var(--neutral-light));padding:30px}
  .mock-funnel-flow{
    display:flex;align-items:center;justify-content:center;
    flex-wrap:wrap;gap:8px;width:100%;
  }
  .funnel-node{
    background:#fff;border:1px solid var(--border);border-radius:10px;
    padding:14px 12px;min-width:90px;text-align:center;
    box-shadow:var(--shadow-sm);
    display:flex;flex-direction:column;gap:4px;align-items:center;
    transition:all .3s;
  }
  .funnel-node.highlight{
    background:var(--primary);color:#fff;border-color:var(--primary);
    box-shadow:var(--shadow-md);
  }
  .funnel-node.highlight .funnel-ico{color:var(--accent-soft)}
  .funnel-ico{font-family:var(--serif);font-size:18px;color:var(--primary);font-style:italic}
  .funnel-label{font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:var(--text-soft);font-weight:600;line-height:1.2}
  .funnel-node.highlight .funnel-label{color:var(--accent-soft)}
  .funnel-arrow{color:var(--accent);font-weight:700;font-size:14px;flex-shrink:0}
  @media (max-width:520px){
    .mock-funnel-flow{flex-direction:column}
    .funnel-arrow{transform:rotate(90deg)}
    .funnel-node{min-width:140px}
  }
</style>

<template data-mock="funnel-html">
  <div class="product-mock mock-funnel">
    <div class="mock-funnel-flow">
      <div class="funnel-node n1"><span class="funnel-ico">{{FUNN1_ICO}}</span><span class="funnel-label">{{FUNN1_LABEL}}</span></div>
      <div class="funnel-arrow">→</div>
      <div class="funnel-node n2"><span class="funnel-ico">{{FUNN2_ICO}}</span><span class="funnel-label">{{FUNN2_LABEL}}</span></div>
      <div class="funnel-arrow">→</div>
      <div class="funnel-node n3"><span class="funnel-ico">{{FUNN3_ICO}}</span><span class="funnel-label">{{FUNN3_LABEL}}</span></div>
      <div class="funnel-arrow">→</div>
      <div class="funnel-node n4 highlight"><span class="funnel-ico">{{FUNN4_ICO}}</span><span class="funnel-label">{{FUNN4_LABEL}}</span></div>
    </div>
  </div>
</template>


<!-- ============================================
     SELEÇÃO DE MOCK · LÓGICA
     ============================================
     Builder lê o tipo de produto e escolhe mock:

     | Tipo de produto | Mock recomendado |
     |---|---|
     | App PWA · iOS · Android | mock-app |
     | E-book · Guia · Workbook | mock-ebook |
     | Mentoria · Curso B2B | mock-mentoria |
     | Newsletter · Boletim | mock-news |
     | Telemedicina · Teleconsulta · Coaching online | mock-tele |
     | SaaS · Dashboard · Plataforma B2B | mock-saas |
     | Canal YouTube · Vídeo course · Reels | mock-youtube |
     | Funil de aquisição · Lead-gen · Performance | mock-funnel |
-->
